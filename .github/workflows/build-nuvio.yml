name: Build Nuvio Tizen WGT

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'docs/**'
      - '.github/workflows/sync-upstream.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: '5.5'
  CERT_NAME: Nuvio
  CERT_PASSWORD: '1234'
  WRAPPER_DIR: tizen-wrapper
  # URL the Online shell redirects to. Mirrors NuvioTVTizen/app/main.js.
  HOSTED_APP_URL: 'https://web.nuvioapp.space/'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [online, native]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install expect
        run: |
          sudo apt-get update
          sudo apt-get install -y expect

      - name: Download & install Tizen Studio
        run: |
          curl -L -o tizen-installer \
            "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm tizen-installer

      - name: Create signing certificate
        run: |
          TIZEN="${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen"
          "$TIZEN" certificate \
            -a "$CERT_NAME" -p "$CERT_PASSWORD" \
            -c NL -s Community -ct World \
            -o "$CERT_NAME" -n "$CERT_NAME" \
            -e community@example.org -f "$CERT_NAME"
          "$TIZEN" security-profiles add \
            -n "$CERT_NAME" \
            -a "${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/${CERT_NAME}.p12" \
            -p "$CERT_PASSWORD"
          "$TIZEN" cli-config \
            "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      # =================================================================
      # NATIVE VARIANT
      # Full packaged build with TMDB / Supabase / endpoint values baked
      # into nuvio.env.js from repo secrets. App runs locally on the TV
      # and talks directly to those backends — no upstream dependency.
      # =================================================================
      - name: Guard required secrets (native)
        if: matrix.variant == 'native'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          missing=()
          [ -z "$TMDB_API_KEY" ]      && missing+=("TMDB_API_KEY")
          [ -z "$SUPABASE_URL" ]      && missing+=("SUPABASE_URL")
          [ -z "$SUPABASE_ANON_KEY" ] && missing+=("SUPABASE_ANON_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets for native build: ${missing[*]}"
            exit 1
          fi

      - name: Write static nuvio.env.js from secrets (native)
        if: matrix.variant == 'native'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TV_LOGIN_REDIRECT_BASE_URL: ${{ secrets.TV_LOGIN_REDIRECT_BASE_URL }}
          YOUTUBE_PROXY_URL: ${{ secrets.YOUTUBE_PROXY_URL }}
          PARENTAL_GUIDE_API_URL: ${{ secrets.PARENTAL_GUIDE_API_URL }}
          INTRODB_API_URL: ${{ secrets.INTRODB_API_URL }}
          TRAILER_API_URL: ${{ secrets.TRAILER_API_URL }}
          IMDB_RATINGS_API_BASE_URL: ${{ secrets.IMDB_RATINGS_API_BASE_URL }}
          AVATAR_PUBLIC_BASE_URL: ${{ secrets.AVATAR_PUBLIC_BASE_URL }}
          ADDON_REMOTE_BASE_URL: ${{ secrets.ADDON_REMOTE_BASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          cat > nuvio.env.js <<EOF
          (function defineNuvioEnv() {
            var root = typeof globalThis !== "undefined" ? globalThis : window;
            var env = Object.assign({}, root.NUVIO_ENV || {}, {
              SUPABASE_URL: "${SUPABASE_URL}",
              SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
              TV_LOGIN_REDIRECT_BASE_URL: "${TV_LOGIN_REDIRECT_BASE_URL}",
              YOUTUBE_PROXY_URL: "${YOUTUBE_PROXY_URL}",
              PARENTAL_GUIDE_API_URL: "${PARENTAL_GUIDE_API_URL}",
              INTRODB_API_URL: "${INTRODB_API_URL}",
              TRAILER_API_URL: "${TRAILER_API_URL}",
              IMDB_RATINGS_API_BASE_URL: "${IMDB_RATINGS_API_BASE_URL}",
              AVATAR_PUBLIC_BASE_URL: "${AVATAR_PUBLIC_BASE_URL}",
              ADDON_REMOTE_BASE_URL: "${ADDON_REMOTE_BASE_URL}",
              ENABLE_REMOTE_WRAPPER_MODE: false,
              PREFERRED_PLAYBACK_ORDER: ["native-file","platform-avplay","native-hls","hls.js","dash.js"],
              TMDB_API_KEY: "${TMDB_API_KEY}"
            });
            root.NUVIO_ENV = env;
            root.__NUVIO_ENV__ = Object.assign({}, root.__NUVIO_ENV__ || {}, env);
          }());
          EOF
          echo "Wrote static nuvio.env.js ($(wc -c < nuvio.env.js) bytes)"

      - name: Install npm deps & build web app (native)
        if: matrix.variant == 'native'
        run: |
          npm ci --no-audit --no-fund
          npm run build
          ls -la dist/

      - name: Stage Tizen wrapper and sync built app (native)
        if: matrix.variant == 'native'
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/${WRAPPER_DIR}"
          cp tizen/config.xml "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/config.xml"
          npm run sync:tizen -- "${GITHUB_WORKSPACE}/${WRAPPER_DIR}"

      - name: Ensure network privileges in config.xml (native)
        if: matrix.variant == 'native'
        run: |
          CFG="${GITHUB_WORKSPACE}/${WRAPPER_DIR}/config.xml"
          if ! grep -q 'privilege/internet' "$CFG"; then
            sed -i 's|</widget>|  <tizen:privilege name="http://tizen.org/privilege/internet"/>\n</widget>|' "$CFG"
          fi
          if ! grep -q '<access ' "$CFG"; then
            sed -i 's|</widget>|  <access origin="*" subdomains="true"/>\n</widget>|' "$CFG"
          fi
          echo "--- final config.xml ---"
          cat "$CFG"

      # =================================================================
      # ONLINE VARIANT
      # Thin redirect shell that mirrors NuvioMedia/NuvioTVTizen/app/main.js.
      # The .wgt contains nothing but a launcher that does
      # window.location.replace("https://web.nuvioapp.space/?source=...").
      # All keys, all logic, all assets live on upstream's server.
      # =================================================================
      - name: Stage thin redirect wrapper (online)
        if: matrix.variant == 'online'
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/${WRAPPER_DIR}"

          # config.xml — Tizen-valid:
          #   package: must match [0-9a-zA-Z]{10} (exactly 10 chars)
          #   id:      "<package>.<AppName>"
          #   profile: "tv" (NOT "tv-samsung")
          #   required_version: 2.3 for broad TV firmware compatibility
          cat > "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/config.xml" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <widget xmlns="http://www.w3.org/ns/widgets"
                  xmlns:tizen="http://tizen.org/ns/widgets"
                  id="http://nuvio.fork/tizen-online"
                  version="1.0.0"
                  viewmodes="maximized">
            <tizen:application id="NuvioOnlin.TizenOnline"
                               package="NuvioOnlin"
                               required_version="2.3"/>
            <content src="index.html"/>
            <icon src="icon.png"/>
            <name>Nuvio TV (Online)</name>
            <tizen:privilege name="http://tizen.org/privilege/internet"/>
            <access origin="*" subdomains="true"/>
            <tizen:allow-navigation>*</tizen:allow-navigation>
            <tizen:setting screen-orientation="landscape" background-support="disable"/>
            <tizen:profile name="tv"/>
          </widget>
          EOF

          # main.js — direct port of NuvioMedia/NuvioTVTizen/app/main.js,
          # with the source param tagged so upstream can distinguish this
          # build from the official TizenBrew module in their analytics.
          cat > "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/main.js" <<EOF
          (function openHostedNuvioTv() {
            var hostedAppUrl = "${HOSTED_APP_URL}";
            var tvInput = window.tizen && window.tizen.tvinputdevice;

            function buildFreshHostedUrl() {
              try {
                var url = new URL(hostedAppUrl);
                url.searchParams.set("source", "madebypatrick-wgt");
                url.searchParams.set("wrapper", "tizen");
                url.searchParams.set("_cb", String(Date.now()));
                return url.toString();
              } catch (_) {
                return hostedAppUrl + "?_cb=" + encodeURIComponent(String(Date.now()));
              }
            }

            if (tvInput && typeof tvInput.registerKey === "function") {
              ["MediaPlay","MediaPause","MediaPlayPause","MediaFastForward","MediaRewind"].forEach(function (k) {
                try { tvInput.registerKey(k); } catch (_) {}
              });
            }
            window.location.replace(buildFreshHostedUrl());
          }());
          EOF

          cat > "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/index.html" <<'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <title>Nuvio TV</title>
            </head>
            <body>
              <script src="main.js"></script>
            </body>
          </html>
          EOF

          # Reuse upstream icon for a consistent launcher tile.
          if [ -f assets/images/tizenIcon.png ]; then
            cp assets/images/tizenIcon.png "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/icon.png"
          elif [ -f res/icon.png ]; then
            cp res/icon.png "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/icon.png"
          fi

          echo "--- online wrapper contents ---"
          ls -la "${GITHUB_WORKSPACE}/${WRAPPER_DIR}"
          echo "--- config.xml ---"
          cat "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/config.xml"
          echo "--- main.js ---"
          cat "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/main.js"

      # =================================================================
      # Shared: build + sign + package
      # =================================================================
      - name: Build Tizen web project
        run: |
          cd "${GITHUB_WORKSPACE}/${WRAPPER_DIR}"
          "${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen" build-web \
            -e ".*" -e "*.map"

      - name: Prepare profiles.xml for non-interactive signing
        run: |
          PROFILES="${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/${CERT_NAME}.pwd|${CERT_PASSWORD}|g" "$PROFILES"
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" "$PROFILES"
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' "$PROFILES"

      - name: Create expect script for packaging
        run: |
          cat > package.exp <<'EOF'
          #!/usr/bin/expect -f
          set timeout 300
          set wrapper $env(GITHUB_WORKSPACE)/$env(WRAPPER_DIR)
          spawn $env(GITHUB_WORKSPACE)/tizen-studio/tools/ide/bin/tizen package -t wgt -s Nuvio -- $wrapper/.buildResult
          expect {
            "Author password:" { send "1234\r"; exp_continue }
            "Save author password" { send "n\r"; exp_continue }
            "Distributor1 password:" { send "tizenpkcs12passfordsigner\r"; exp_continue }
            "Save distributor1 password" { send "n\r"; exp_continue }
            eof
          }
          EOF
          chmod +x package.exp

      - name: Package WGT
        run: |
          ./package.exp
          mkdir -p release
          wgt=$(find "${GITHUB_WORKSPACE}/${WRAPPER_DIR}/.buildResult" -maxdepth 1 -name '*.wgt' | head -n1)
          [ -n "$wgt" ] || { echo "::error::No .wgt produced"; exit 1; }
          if [ "${{ matrix.variant }}" = "online" ]; then
            mv "$wgt" release/Nuvio-Online.wgt
          else
            mv "$wgt" release/Nuvio-Native.wgt
          fi
          ls -la release/

      - name: Upload variant artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuvio-${{ matrix.variant }}-wgt
          path: release/*.wgt
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect .wgt files
        run: |
          mkdir -p release
          find artifacts -name '*.wgt' -exec cp {} release/ \;
          ls -la release/

      - name: Compute release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +'%Y-%m-%d-%H%M')
          PRETTY=$(date -u +'%Y-%m-%d %H:%M UTC')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "pretty=$PRETTY" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Nuvio Tizen v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.pretty }})"
          files: release/*.wgt
          body: |
            Automated Tizen `.wgt` builds from this fork of
            [NuvioMedia/NuvioWeb](https://github.com/NuvioMedia/NuvioWeb),
            kept in sync daily by `sync-upstream.yml`.

            Two variants per release:

            - **`Nuvio-Online.wgt`** — thin redirect shell. Opens
              `https://web.nuvioapp.space/` in a Tizen WebView. Mirrors
              the approach of `NuvioMedia/NuvioTVTizen` but packaged as
              a sideloadable `.wgt` rather than a TizenBrew module.
              Depends on upstream's hosted endpoint staying online.
            - **`Nuvio-Native.wgt`** — full app bundle with all backend
              endpoints (TMDB, Supabase, addon backend, etc.) baked into
              `nuvio.env.js` from repository secrets. Runs locally on the
              TV without depending on upstream's hosted instance.

            Built ${{ steps.meta.outputs.pretty }}.

            ## Installation

            1. Enable Developer Mode on your Samsung Tizen TV.
            2. Sideload either `.wgt` via [Jellyfin2Samsung](https://github.com/Jellyfin2Samsung/Samsung-Jellyfin-Installer/releases/latest), Tizen Studio or `sdb`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
